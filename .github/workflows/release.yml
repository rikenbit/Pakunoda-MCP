name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          pip install -e '.[test]'
          pytest -v

      - name: Build Docker image
        run: docker build -t pakunoda-mcp:${{ github.ref_name }} .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/release_notes_v0.1.0.md
          draft: false
          prerelease: false
